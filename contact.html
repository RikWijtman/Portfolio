<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>contact forum</title>
    <link rel="stylesheet" href="CSS/styles.css">
</head>
<body>
    <nav target="_blank">
        <div class="navTop">
            <img class="logo" src="Images/Logo.png" alt="">
            <a class="links" href="index.html" style="text-decoration:none">Back</a>
        </div>
    </nav>

    <main>
        <H1>Contact</H1>

        <form action="contact-binnen.html">
            <div>
                <label class="text" for="name">Naam:</label>
                <input type="text" name="name" class="text" placeholder="Fred Wildrikson" required>
            </div>
            <div>
                <label class="text" for="birthDate">Geboortedatum:</label>
                <input type="date" name="birthDate" class="text" required>
            </div>
            <div>
                <label class="label text" for="email">E-mail:</label>
                <input type="text" name="email" class="text" placeholder="naam@mail.com" required>
            </div>
            <div>
                <strong class="subtitel">Onderwerp</strong>
            </div>
            <div>
                <label for="contactType" class="label text">Reden voor contact</label>
                <select name="contactType" id="contactType" class="text" required>
                    <option>Persoonlijk</option>
                    <option>Zakelijk</option>
                    <option>Artistiek</option>
                </select>
            </div>

            <input type="radio" id="tip" name="tip">
            <label for="tip" class="label text">Tip</label>

            <input type="radio" id="top" name="top">
            <label for="top" class="label text">Top</label>

            <input type="radio" id="question" name="question">
            <label for="question" class="label text">Vraag</label>
            
            <div>
                <label class="text" for="invulvak">Invulvak:</label>
                <input type="text" name="invulvak" class="text" placeholder="Hier invullen" required>
            </div>

            <div>
                <input type="checkbox" id="robot" name="robot" required>
                <label class="label text" for="robot">Ik ben geen robot</label>
            </div>

            <button type="submit" class="text">Verstuur</button>
        </form>       
    </main>
</body>
</html>
