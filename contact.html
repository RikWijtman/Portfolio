<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>contact forum</title>
    <link rel="stylesheet" href="CSS/styles.css">
    <link rel="stylesheet" href="CSS/Region.css">
</head>
<body>
    <nav target="_blank">
        <div class="RegionLISI">
            <a class="NH" href="Region.html" style="text-decoration:none">Back</a>
        </div>
    </nav>

    <canvas id="myCanvasTop">
    </canvas>
        
    <script>
    var c = document.getElementById("myCanvasTop");
    var ctx = c.getContext("2d");
    // Create gradient
    var grd = ctx.createLinearGradient(0,0,0,30);
    grd.addColorStop(0,"crimson");
    grd.addColorStop(1,"transparent");
    // Fill with gradient
    ctx.fillStyle = grd;
    ctx.fillRect(0,0,300,200);
    </script>

    <main>
        <H1 class="CO">Contact</H1>

        <form action="contact-binnen.html">
        <label class="label text" for="name">Voornaam:</label>
        <input type="text" name="name" class="IB" required>
        <br>
        <label class="label text" for="email">E-mail:</label>
        <input type="text" name="email" class="IB" placeholder="naam@hr.nl" required>
        <br>
        <strong class="text">Onderwerp</strong>
        <br>
        <label class="label text" for="category">Ik heb een...</label>
        <select class="IB" name="category">
            <option value="0">Vraag</option>
            <option value="1">Idee</option>
            <option value="2">Nieuwe pokemon</option>
        </select>
        <br>
        <label class="label text" for="invulvak">Invulvak:</label>
        <input type="text" name="invulvak" class="IB" placeholder="Hier invullen" required>
        <br>
        <button type="submit" class="text">Verstuur</button>
        </form>       
    </main>
</body>
</html>
